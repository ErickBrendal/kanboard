<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBL — Test Dashboard</title>
    <style>
        :root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3250;--accent:#4f6ef7;--accent2:#7c3aed;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--orange:#f97316;--text:#e2e8f0;--muted:#8892b0;--white:#fff;}
        body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
        .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:24px;}
        .kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 18px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;}
        .kpi.blue::before{background:linear-gradient(90deg,#4f6ef7,#7c3aed);}
        .klabel{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;font-weight:600;}
        .kvalue{font-size:34px;font-weight:800;color:var(--white);line-height:1;letter-spacing:-1px;}
    </style>
    <script src="script.js"></script>
    <script src="test_data.js"></script>
</head>
<body>
    <div class="page active">
        <div class="kpi-grid">
            <div class="kpi blue">
                <div class="klabel">Total Demandas</div>
                <div class="kvalue" id="kpi-total-demandas">0</div>
            </div>
        </div>
    </div>
</body>
</html>
