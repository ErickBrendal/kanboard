version: '3.8'

services:
  kanboard:
    image: kanboard/kanboard:latest
    container_name: kanboard_app
    restart: always
    volumes:
      - kanboard_data:/var/www/app/data
      - kanboard_plugins:/var/www/app/plugins
      - ./config.php:/var/www/app/config.php:ro
      - ./css/custom.css:/var/www/app/assets/css/custom.css:ro
    environment:
      DATABASE_URL: "postgres://kanboard:${DB_PASSWORD}@db:5432/kanboard"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kanboard_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    container_name: kanboard_db
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init-bi-schema.sql:/docker-entrypoint-initdb.d/01-bi-schema.sql:ro
    environment:
      POSTGRES_USER: kanboard
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: kanboard
    networks:
      - kanboard_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: kanboard_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - kanboard
    networks:
      - kanboard_net

  certbot:
    image: certbot/certbot
    container_name: kanboard_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - kanboard_net

volumes:
  kanboard_data:
  kanboard_plugins:
  pg_data:
  certbot_www:
  certbot_conf:

networks:
  kanboard_net:
    driver: bridge
